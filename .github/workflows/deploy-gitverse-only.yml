name: Deploy to Cloud.ru (GitVerse)

on:
  push:
    branches:
      - master
    paths:
      - "apps/**"
      - "packages/**"
      - "ecosystem.config.js"
      - ".github/workflows/deploy-gitverse-only.yml"
      - ".gitverse/workflows/deploy.yaml"
      - "infra/nginx/**"
      - "infra/scripts/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets and exit gracefully if not configured
        id: check-secrets
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "ℹ️ This workflow is designed for GitVerse only."
            echo "ℹ️ Secrets not configured on this platform. Exiting gracefully."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "✅ Secrets configured, proceeding"
          echo "skip=false" >> $GITHUB_OUTPUT
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Checkout code
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup SSH
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Write API env file
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -p ${SSH_PORT:-22} \
              ${SSH_USER}@${SSH_HOST} "cat > ~/profitableweb/apps/api/.env" << ENVEOF
          DATABASE_URL=${DATABASE_URL}
          JWT_SECRET=${JWT_SECRET}
          YANDEX_CLIENT_ID=${YANDEX_CLIENT_ID}
          YANDEX_CLIENT_SECRET=${YANDEX_CLIENT_SECRET}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          FRONTEND_URL=${FRONTEND_URL}
          ADMIN_URL=${ADMIN_URL}
          CORS_ORIGINS=${CORS_ORIGINS}
          ENVEOF
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}

      - name: Deploy to VM
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -p ${SSH_PORT:-22} \
              ${SSH_USER}@${SSH_HOST} << 'EOF'
            set -e
            export PATH="$HOME/.local/bin:$HOME/.bun/bin:$PATH"

            # Клонирование или обновление репозитория
            if [ -d ~/profitableweb/.git ]; then
              echo "📥 Обновление репозитория..."
              cd ~/profitableweb
              git fetch origin
              git reset --hard origin/master
            else
              echo "📦 Клонирование репозитория..."
              rm -rf ~/profitableweb
              git clone https://gitverse.ru/profitableweb.ru/pw-monorepo.git ~/profitableweb
              cd ~/profitableweb
            fi

            # Установка JS-зависимостей из корня монорепо (единый lockfile)
            bun install

            # API: установка зависимостей + миграции БД
            cd apps/api
            uv sync
            uv run alembic upgrade head

            # Web: проверка типов + сборка
            cd ../web
            bun run type-check
            bun run build

            # Admin: сборка
            cd ../admin
            bun run build

            # Перезапуск всех сервисов
            cd ~/profitableweb
            pm2 restart ecosystem.config.js --update-env || pm2 start ecosystem.config.js

            echo "✅ Deploy completed!"
          EOF
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}

      - name: Verify deployment
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          echo "🔍 Проверка доступности сервиса..."
          sleep 5
          curl -f http://${{ secrets.SSH_HOST }}/api/health || echo "⚠️ Health check failed, but deploy might still be running"
