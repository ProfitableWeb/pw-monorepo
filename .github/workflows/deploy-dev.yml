name: Deploy Dev

on:
  push:
    branches: [develop]
    paths:
      - "apps/**"
      - "packages/**"
      - "docker-compose.dev.yml"
      - ".github/workflows/deploy-dev.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${SSH_PORT:-22} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}

      - name: Write env and deploy
        run: |
          # Формируем .env.dev локально (надёжнее чем echo -e через pipe)
          ENV_FILE=$(mktemp)
          {
            echo "POSTGRES_DB=profitableweb_dev"
            echo "POSTGRES_USER=pw"
            echo "POSTGRES_PASSWORD=${DEV_POSTGRES_PASSWORD}"
            [ -n "$DEV_JWT_SECRET" ]     && echo "JWT_SECRET=${DEV_JWT_SECRET}"
            echo "FRONTEND_URL=http://dev.profitableweb.ru"
            echo "ADMIN_URL=http://dev.profitableweb.ru/admin"
            echo "CORS_ORIGINS=[\"http://dev.profitableweb.ru\"]"
            [ -n "$STORAGE_BACKEND" ]    && echo "STORAGE_BACKEND=${STORAGE_BACKEND}"
            [ -n "$S3_ENDPOINT" ]        && echo "S3_ENDPOINT=${S3_ENDPOINT}"
            [ -n "$S3_BUCKET" ]          && echo "S3_BUCKET=${S3_BUCKET}"
            [ -n "$S3_ACCESS_KEY" ]      && echo "S3_ACCESS_KEY=${S3_ACCESS_KEY}"
            [ -n "$S3_SECRET_KEY" ]      && echo "S3_SECRET_KEY=${S3_SECRET_KEY}"
            [ -n "$S3_REGION" ]          && echo "S3_REGION=${S3_REGION}"
            [ -n "$S3_PUBLIC_ENDPOINT" ] && echo "S3_PUBLIC_ENDPOINT=${S3_PUBLIC_ENDPOINT}"
          } > "$ENV_FILE"

          # Копируем файл на сервер через scp (атомарно, надёжнее pipe)
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -P ${SSH_PORT:-22} \
              "$ENV_FILE" "${SSH_USER}@${SSH_HOST}:~/profitableweb/.env.dev"
          rm -f "$ENV_FILE"

          # Деплой (ServerAliveInterval не даёт SSH отвалиться во время docker build)
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              -p ${SSH_PORT:-22} \
              ${SSH_USER}@${SSH_HOST} << 'EOF'
            set -e

            cd ~/profitableweb

            # Проверяем что .env.dev содержит POSTGRES_PASSWORD
            grep -q "POSTGRES_PASSWORD=." .env.dev || { echo "ERROR: .env.dev missing POSTGRES_PASSWORD"; exit 1; }

            # Обновление кода (ветка develop)
            git fetch origin
            git checkout develop 2>/dev/null || git checkout -b develop origin/develop
            git reset --hard origin/develop

            # Сборка и запуск dev-контейнеров
            docker compose -f docker-compose.dev.yml --env-file .env.dev up -d --build --remove-orphans

            echo "Dev deploy completed!"
          EOF
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEV_POSTGRES_PASSWORD: ${{ secrets.DEV_POSTGRES_PASSWORD }}
          DEV_JWT_SECRET: ${{ secrets.DEV_JWT_SECRET }}
          STORAGE_BACKEND: ${{ secrets.STORAGE_BACKEND }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_PUBLIC_ENDPOINT: ${{ secrets.S3_PUBLIC_ENDPOINT }}

      - name: Health check
        run: |
          sleep 10
          curl -f http://dev.${{ secrets.SSH_HOST }}/api/health || echo "Dev health check failed"
