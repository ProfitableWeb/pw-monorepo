name: Deploy Dev

on:
  push:
    branches: [develop]
    paths:
      - "apps/**"
      - "packages/**"
      - "docker-compose.dev.yml"
      - ".github/workflows/deploy-dev.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${SSH_PORT:-22} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}

      - name: Write dev env file
        run: |
          ENV_CONTENT=""
          ENV_CONTENT="${ENV_CONTENT}POSTGRES_DB=profitableweb_dev\n"
          ENV_CONTENT="${ENV_CONTENT}POSTGRES_USER=pw\n"
          ENV_CONTENT="${ENV_CONTENT}POSTGRES_PASSWORD=${DEV_POSTGRES_PASSWORD}\n"
          [ -n "$DEV_JWT_SECRET" ] && ENV_CONTENT="${ENV_CONTENT}JWT_SECRET=${DEV_JWT_SECRET}\n"
          ENV_CONTENT="${ENV_CONTENT}FRONTEND_URL=http://dev.profitableweb.ru\n"
          ENV_CONTENT="${ENV_CONTENT}ADMIN_URL=http://dev.profitableweb.ru/admin\n"
          ENV_CONTENT="${ENV_CONTENT}CORS_ORIGINS=[\"http://dev.profitableweb.ru\"]\n"
          [ -n "$STORAGE_BACKEND" ]    && ENV_CONTENT="${ENV_CONTENT}STORAGE_BACKEND=${STORAGE_BACKEND}\n"
          [ -n "$S3_ENDPOINT" ]        && ENV_CONTENT="${ENV_CONTENT}S3_ENDPOINT=${S3_ENDPOINT}\n"
          [ -n "$S3_BUCKET" ]          && ENV_CONTENT="${ENV_CONTENT}S3_BUCKET=${S3_BUCKET}\n"
          [ -n "$S3_ACCESS_KEY" ]      && ENV_CONTENT="${ENV_CONTENT}S3_ACCESS_KEY=${S3_ACCESS_KEY}\n"
          [ -n "$S3_SECRET_KEY" ]      && ENV_CONTENT="${ENV_CONTENT}S3_SECRET_KEY=${S3_SECRET_KEY}\n"
          [ -n "$S3_REGION" ]          && ENV_CONTENT="${ENV_CONTENT}S3_REGION=${S3_REGION}\n"
          [ -n "$S3_PUBLIC_ENDPOINT" ] && ENV_CONTENT="${ENV_CONTENT}S3_PUBLIC_ENDPOINT=${S3_PUBLIC_ENDPOINT}\n"

          echo -e "$ENV_CONTENT" | ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -p ${SSH_PORT:-22} \
              ${SSH_USER}@${SSH_HOST} "cat > ~/profitableweb/.env.dev"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEV_POSTGRES_PASSWORD: ${{ secrets.DEV_POSTGRES_PASSWORD }}
          DEV_JWT_SECRET: ${{ secrets.DEV_JWT_SECRET }}
          STORAGE_BACKEND: ${{ secrets.STORAGE_BACKEND }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_PUBLIC_ENDPOINT: ${{ secrets.S3_PUBLIC_ENDPOINT }}

      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -p ${SSH_PORT:-22} \
              ${SSH_USER}@${SSH_HOST} << 'EOF'
            set -e

            cd ~/profitableweb

            # Обновление кода (ветка develop)
            git fetch origin
            git checkout develop 2>/dev/null || git checkout -b develop origin/develop
            git reset --hard origin/develop

            # Сборка и запуск dev-контейнеров
            docker compose -f docker-compose.dev.yml --env-file .env.dev up -d --build --remove-orphans

            echo "Dev deploy completed!"
          EOF
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}

      - name: Health check
        run: |
          sleep 10
          curl -f http://dev.${{ secrets.SSH_HOST }}/api/health || echo "Dev health check failed"
