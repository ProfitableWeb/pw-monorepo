name: pw-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: pw-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-profitableweb_dev}
      POSTGRES_USER: ${POSTGRES_USER:-pw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pw-dev-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pw} -d ${POSTGRES_DB:-profitableweb_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pw-dev-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pw}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-profitableweb_dev}
    ports:
      - "127.0.0.1:8100:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: pw-dev-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000/api
    ports:
      - "127.0.0.1:3100:3000"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: pw-dev-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:3101:80"

volumes:
  pw-dev-data:
