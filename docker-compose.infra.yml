services:
  gitea:
    image: gitea/gitea:latest
    container_name: pw-gitea
    restart: unless-stopped
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-db:5432
      - GITEA__database__NAME=${GITEA_DB:-gitea}
      - GITEA__database__USER=${GITEA_DB_USER:-gitea}
      - GITEA__database__PASSWD=${GITEA_DB_PASSWORD:-gitea}
      - GITEA__server__ROOT_URL=http://git.profitableweb.ru
      - GITEA__server__HTTP_PORT=3000
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "127.0.0.1:3300:3000"
      - "127.0.0.1:2222:22"
    depends_on:
      gitea-db:
        condition: service_healthy

  gitea-db:
    image: postgres:16-alpine
    container_name: pw-gitea-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GITEA_DB:-gitea}
      POSTGRES_USER: ${GITEA_DB_USER:-gitea}
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD:-gitea}
    volumes:
      - gitea-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GITEA_DB_USER:-gitea} -d ${GITEA_DB:-gitea}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gitea-data:
  gitea-db-data:
